name: Build and Deploy

on:
  push:
    branches:
      - main
  # workflow_dispatch is supported in newer Forgejo versions,
  # but can be omitted if not needed.
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: docker
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.164.0'

      - name: Build Hugo Site
        run: hugo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Node 24 is bleeding edge; 20 is the current LTS

      - name: Index with Pagefind
        run: npx pagefind --site public

      # To deploy in Forgejo, the most common method is pushing to a
      # dedicated branch (e.g., 'pages').
      # This replaces the GitHub-specific upload/deploy steps.
      - name: Deploy to Pages Branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ forgejo.token }}
          publish_dir: ./public
          publish_branch: pages
