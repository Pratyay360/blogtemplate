{{ define "main" }}
<div style="text-align: center; padding: 4rem 1rem;">
  <h1 style="font-size: 6rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem;">404</h1>
  <h2 style="font-size: 1.75rem; font-weight: 700; margin-bottom: 1rem;">Page Not Found</h2>
  <p style="color: var(--text-secondary); max-width: 450px; margin: 0 auto 2rem auto;">
    The page you are looking for doesn't exist, has been removed, or is temporarily unavailable.
  </p>
  <a href="{{ .Site.BaseURL }}" class="social-pill" style="background: var(--accent-gradient); color: #ffffff; padding: 0.75rem 1.5rem; font-weight: 600; border: none;">
    &larr; Back to Home
  </a>
</div>
{{ end }}
