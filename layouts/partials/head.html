<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} :: {{ .Site.Title }}{{ end }}</title>
<meta name="description" content="{{ if .Description }}{{ .Description }}{{ else if .IsHome }}{{ .Site.Params.sitedescription }}{{ else }}{{ .Summary | plainify }}{{ end }}">

<!-- CSS via Hugo Pipes -->
{{ $css := resources.Get "css/main.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}">

<!-- Pagefind Search CDN -->
<link href="https://cdn.jsdelivr.net/npm/pagefind@1.3.2/pagefind-ui.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/pagefind@1.3.2/pagefind-ui.js" type="module"></script>
