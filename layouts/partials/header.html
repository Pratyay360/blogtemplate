<div class="site-title">
  <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
</div>

<nav>
  {{ if .Site.Menus.header }}
    {{ range .Site.Menus.header }}
    <a href="{{ .URL | relURL }}" {{ if or (eq .URL "#search") (eq .URL "/#search") (hasSuffix .URL "#search") }}id="search-toggle"{{ end }}>{{ .Name }}</a>

    {{ end }}
  {{ end }}
</nav>

<script>
  function initSearch() {
    const searchTarget = document.querySelector('#search');
    if (searchTarget && !searchTarget.dataset.pagefindInitialized && typeof PagefindUI !== 'undefined') {
      searchTarget.dataset.pagefindInitialized = "true";
      new PagefindUI({
        element: "#search",
        showSubResults: true,
        showImages: false,
        autofocus: true
      });
    }

    const searchModal = document.getElementById('search-modal');
    const searchToggle = document.getElementById('search-toggle');
    const searchClose = document.getElementById('search-close');

    function openSearch(e) {
      if (e) e.preventDefault();
      if (searchModal) {
        searchModal.classList.add('active');
        setTimeout(() => {
          const input = searchModal.querySelector('input');
          if (input) input.focus();
        }, 50);
      }
    }

    function closeSearch() {
      if (searchModal) {
        searchModal.classList.remove('active');
        const input = searchModal.querySelector('input');
        if (input) {
          input.value = '';
          input.dispatchEvent(new Event('input'));
        }
      }
    }

    if (searchClose) searchClose.addEventListener('click', closeSearch);

    document.querySelectorAll('a[href*="#search"], a[href$="#search"], #search-toggle, .search-toggle-btn').forEach(anchor => {
      anchor.addEventListener('click', openSearch);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSearch();
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        openSearch(e);
      }
    });

    if (searchModal) {
      searchModal.addEventListener('click', (e) => {
        if (e.target === searchModal) closeSearch();
      });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initSearch);
  } else {
    initSearch();
  }
</script>
