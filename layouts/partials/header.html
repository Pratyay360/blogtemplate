<div class="site-title">
  <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
</div>

<nav>
  {{ if .Site.Menus.header }}
    {{ range .Site.Menus.header }}
    <a href="{{ .URL | relURL }}" {{ if eq .URL "#search" }}id="search-toggle"{{ end }}>{{ .Name }}</a>
    {{ end }}
  {{ end }}
</nav>

<script type="module">
  import { PagefindUI } from 'https://cdn.jsdelivr.net/npm/@pagefind/default-ui@1.5.2/ui.js';

  window.addEventListener('DOMContentLoaded', () => {
    const searchTarget = document.querySelector('#search');
    if (searchTarget && !searchTarget.dataset.pagefindInitialized) {
      searchTarget.dataset.pagefindInitialized = "true";
      new PagefindUI({
        element: "#search",
        showSubResults: true,
        showImages: false,
        bundlePath: "/pagefind/",
        autofocus: true
      });
    }

    const searchModal = document.getElementById('search-modal');
    const searchToggle = document.getElementById('search-toggle');
    const searchClose = document.getElementById('search-close');

    function openSearch(e) {
      if (e) e.preventDefault();
      if (searchModal) {
        searchModal.classList.add('active');
        const input = searchModal.querySelector('input');
        if (input) input.focus();
      }
    }

    function closeSearch() {
      if (searchModal) {
        searchModal.classList.remove('active');
      }
    }

    if (searchToggle) searchToggle.addEventListener('click', openSearch);
    if (searchClose) searchClose.addEventListener('click', closeSearch);

    document.querySelectorAll('a[href="#search"]').forEach(anchor => {
      anchor.addEventListener('click', openSearch);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSearch();
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        openSearch(e);
      }
    });

    if (searchModal) {
      searchModal.addEventListener('click', (e) => {
        if (e.target === searchModal) closeSearch();
      });
    }
  });
</script>
